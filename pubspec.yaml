name: nabc_web
description: "NABC 2026 — standalone Flutter Web build of the member portal (dynamic, real API via bundled proxy)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.0
  carousel_slider: ^5.1.2
  image_picker: ^1.1.2     # has first-class web support
  geolocator: ^13.0.2      # has first-class web support
  url_launcher: ^6.3.1
  intl: ^0.20.2
  google_fonts: ^6.2.1
  # NOTE: permission_handler is intentionally omitted — it is unused in the
  # code and ships no web implementation, which would break `flutter build web`.

  # ── Dart-only API proxy (bin/server.dart) ──────────────────────────────
  shelf: ^1.4.1
  shelf_static: ^1.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/